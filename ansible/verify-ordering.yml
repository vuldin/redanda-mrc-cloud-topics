# ============================================================
# Play 6: Test D — All regions local produce + consume in parallel
# ============================================================

- name: "Test D: All regions produce locally (parallel)"
  hosts: client
  become: true
  tags: [test_d]
  vars:
    verify_count: "{{ verify_count | default(10000) }}"
    record_size: 1024
    topic_map:
      us-east4: verify-us
      europe-west1: verify-eu
      asia-northeast3: verify-ap
  tasks:
    - name: "Test D: Produce {{ verify_count }} sequenced records to local topic"
      ansible.builtin.shell: |
        export PATH=$PATH:/usr/local/go/bin:/root/go/bin
        TOPIC="{{ topic_map[rack] }}"
        mrc-bench produce \
          --brokers {{ broker_ip }}:9092 \
          --topic "$TOPIC" \
          --record-size {{ record_size }} \
          --count {{ verify_count }} \
          --rate 0 \
          --acks all \
          --compression lz4 \
          --linger 5ms \
          --verify \
          --partitions 6 \
          --output /opt/verify-results/test-d-{{ rack }}-produce.json
      register: produce_d
      timeout: 300

    - name: "Test D: Display produce output"
      ansible.builtin.debug:
        msg: "{{ produce_d.stderr_lines | default([]) }}"

- name: "Test D: All regions consume locally (parallel)"
  hosts: client
  become: true
  tags: [test_d]
  vars:
    verify_count: "{{ verify_count | default(10000) }}"
    topic_map:
      us-east4: verify-us
      europe-west1: verify-eu
      asia-northeast3: verify-ap
  tasks:
    - name: "Test D: Consume and verify {{ verify_count }} records from local topic"
      ansible.builtin.shell: |
        export PATH=$PATH:/usr/local/go/bin:/root/go/bin
        TOPIC="{{ topic_map[rack] }}"
        mrc-bench consume \
          --brokers {{ broker_ip }}:9092 \
          --topic "$TOPIC" \
          --group verify-d-{{ rack }}-{{ ansible_date_time.epoch }} \
          --count {{ verify_count }} \
          --duration 300s \
          --verify \
          --output /opt/verify-results/test-d-{{ rack }}-consume.json
      register: consume_d
      timeout: 360
      failed_when: false

    - name: "Test D: Display consume/verify output"
      ansible.builtin.debug:
        msg: "{{ consume_d.stderr_lines | default([]) }}"

    - name: "Test D: Result"
      ansible.builtin.debug:
        msg: >-
          TEST D ({{ rack }} local, no CRR):
          {{ 'PASS' if consume_d.rc == 0 else 'FAIL (rc=' + consume_d.rc | string + ')' }}

# ============================================================
# Play 7: Report — Fetch and summarize all results
# ============================================================

- name: "Report: Collect and summarize verification results"
  hosts: client
  become: true
  tags: [report]
  tasks:
    - name: Find all verification result files
      ansible.builtin.find:
        paths: /opt/verify-results
        patterns: "*.json"
      register: result_files

    - name: Read verification result files
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      loop: "{{ result_files.files }}"
      register: result_contents
      when: result_files.files | length > 0

    - name: Display results for this host
      ansible.builtin.debug:
        msg: |
          === {{ inventory_hostname }} ({{ rack }}) ===
          {% for item in result_contents.results | default([]) %}
          {% if item.content is defined %}
          {% set data = item.content | b64decode | from_json %}
          File: {{ item.item.path | basename }}
          {% if data.verify is defined %}
            Verify: {{ 'PASS' if data.pass else 'FAIL' }}
            Records: {{ data.total_records }}
            {% for pid, pdata in (data.partitions | default({})).items() %}
            Partition {{ pid }}: {{ pdata.status }} (total={{ pdata.total }} gaps={{ pdata.gaps }} dups={{ pdata.duplicates }} ooo={{ pdata.out_of_order }})
            {% endfor %}
          {% else %}
            Records: {{ data.total_records | default(data.total_sent | default('N/A')) }}
            Rate: {{ data.avg_rate_msg_s | default('N/A') }} msg/s
          {% endif %}
          ---
          {% endif %}
          {% endfor %}
      when: result_contents.results is defined

- name: "Report: Summary"
  hosts: localhost
  connection: local
  tags: [report]
  tasks:
    - name: Print test matrix summary
      ansible.builtin.debug:
        msg: |
          ╔══════════════════════════════════════════════════════════════╗
          ║           ORDERING VERIFICATION SUMMARY                     ║
          ╠══════════════════════════════════════════════════════════════╣
          ║ Test A: Local US produce + consume (no CRR)   → Baseline   ║
          ║ Test B: US produce → EU consume (CRR path)    → CRR test   ║
          ║ Test C: US produce → AP consume (longest CRR)  → CRR test  ║
          ║ Test D: Each region local (parallel, no CRR)  → Baseline   ║
          ╠══════════════════════════════════════════════════════════════╣
          ║ Tests A & D should always PASS (no CRR involved).          ║
          ║ Tests B & C may FAIL if CRR violates ordering.             ║
          ║                                                             ║
          ║ Check JSON files in /opt/verify-results/ on each client     ║
          ║ for per-partition verification detail.                       ║
          ╚══════════════════════════════════════════════════════════════╝
